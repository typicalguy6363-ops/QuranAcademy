<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Create Account | QuranAcademy</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<header class="auth-header">

    <a class="auth-logo" href="index.html">
        QuranAcademy
    </a>

    <nav class="auth-nav">
        <a href="index.html">Home</a>

        <a
            class="primary-link"
            href="signin.html"
        >
            Sign In
        </a>
    </nav>

</header>

<main class="auth-page">

    <section class="auth-card">

        <div class="auth-icon">
            🌙
        </div>

        <h1>
            Create Account
        </h1>

        <p class="auth-description">
            Create a free QuranAcademy account and
            save your learning progress.
        </p>

        <form id="signupForm">

            <div class="form-group">

                <label for="username">
                    Learner nickname
                </label>

                <input
                    id="username"
                    name="username"
                    type="text"
                    minlength="3"
                    maxlength="20"
                    autocomplete="nickname"
                    required
                >

                <p class="form-help">
                    Use a safe nickname, not your full real name.
                </p>

            </div>

            <div class="form-group">

                <label for="email">
                    Parent or account email
                </label>

                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required
                >

            </div>

            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input
                    id="password"
                    name="password"
                    type="password"
                    minlength="8"
                    autocomplete="new-password"
                    required
                >

                <p class="form-help">
                    Use at least 8 characters.
                </p>

            </div>

            <div class="form-group">

                <label for="confirmPassword">
                    Confirm password
                </label>

                <input
                    id="confirmPassword"
                    name="confirmPassword"
                    type="password"
                    minlength="8"
                    autocomplete="new-password"
                    required
                >

            </div>

            <button
                class="auth-button"
                id="signupButton"
                type="submit"
            >
                Create Free Account
            </button>

            <div
                class="auth-message"
                id="signupMessage"
            ></div>

        </form>

        <p class="auth-bottom-text">
            Already registered?
            <a href="signin.html">Sign in here</a>
        </p>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
    const signupForm =
        document.getElementById("signupForm");

    const signupButton =
        document.getElementById("signupButton");

    const signupMessage =
        document.getElementById("signupMessage");

    function showSignupMessage(message, type) {
        signupMessage.textContent = message;

        signupMessage.className =
            `auth-message show ${type}`;
    }

    signupForm.addEventListener(
        "submit",
        async (event) => {
            event.preventDefault();

            const username =
                document
                    .getElementById("username")
                    .value
                    .trim();

            const email =
                document
                    .getElementById("email")
                    .value
                    .trim()
                    .toLowerCase();

            const password =
                document
                    .getElementById("password")
                    .value;

            const confirmPassword =
                document
                    .getElementById(
                        "confirmPassword"
                    )
                    .value;

            if (username.length < 3) {
                showSignupMessage(
                    "Your nickname must contain at least 3 characters.",
                    "error"
                );

                return;
            }

            if (password.length < 8) {
                showSignupMessage(
                    "Your password must contain at least 8 characters.",
                    "error"
                );

                return;
            }

            if (password !== confirmPassword) {
                showSignupMessage(
                    "The passwords do not match.",
                    "error"
                );

                return;
            }

            signupButton.disabled = true;
            signupButton.textContent =
                "Creating account...";

            signupMessage.className =
                "auth-message";

            try {
                const {
                    data,
                    error
                } =
                    await window
                        .quranAcademySupabase
                        .auth
                        .signUp({
                            email,
                            password,

                            options: {
                                data: {
                                    username: username
                                },

                                emailRedirectTo:
                                    "https://quranacademy24.com/account.html"
                            }
                        });

                if (error) {
                    throw error;
                }

                if (data.session) {
                    window.location.href =
                        "account.html";

                    return;
                }

                signupForm.reset();

                showSignupMessage(
                    "Account created! Check your email and press the confirmation link. Then return and sign in.",
                    "success"
                );
            } catch (error) {
                console.error(error);

                showSignupMessage(
                    error.message ||
                    "The account could not be created.",
                    "error"
                );
            } finally {
                signupButton.disabled = false;

                signupButton.textContent =
                    "Create Free Account";
            }
        }
    );
</script>

</body>
</html>
