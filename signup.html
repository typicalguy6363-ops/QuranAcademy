<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Create Account | QuranAcademy</title>

    <link rel="stylesheet" href="auth.css">

    <style>
        .login-divider {
            margin: 25px 0 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #8796a6;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .login-divider::before,
        .login-divider::after {
            content: "";
            height: 1px;
            flex: 1;
            background: #dbe9e4;
        }

        .login-options {
            display: grid;
            gap: 11px;
        }

        .login-option {
            width: 100%;
            min-height: 51px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 2px solid #dbe9e4;
            border-radius: 15px;
            color: #1d3557;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 800;
            transition:
                transform 0.2s ease,
                border-color 0.2s ease,
                background 0.2s ease;
        }

        .login-option:hover {
            transform: translateY(-2px);
            border-color: #0f9d78;
            background: #f5fcf9;
        }

        .login-option:disabled {
            opacity: 0.6;
            cursor: wait;
            transform: none;
        }

        .login-option-icon {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            border-radius: 9px;
            font-size: 1rem;
            font-weight: 900;
        }

        .google-icon {
            color: #4285f4;
            background: #eef4ff;
        }

        .email-icon {
            color: #08745a;
            background: #e2f7ef;
        }

        .apple-icon {
            color: white;
            background: #111111;
        }
    </style>
</head>

<body>

<header class="auth-header">

    <a class="auth-logo" href="index.html">
        QuranAcademy
    </a>

    <nav class="auth-nav">
        <a href="index.html">Home</a>

        <a
            class="primary-link"
            href="signin.html"
        >
            Sign In
        </a>
    </nav>

</header>

<main class="auth-page">

    <section class="auth-card">

        <div class="auth-icon">
            🌙
        </div>

        <h1>
            Create Account
        </h1>

        <p class="auth-description">
            Create a free account and save your
            QuranAcademy learning progress.
        </p>

        <form id="signupForm">

            <div class="form-group">

                <label for="username">
                    Learner nickname
                </label>

                <input
                    id="username"
                    name="username"
                    type="text"
                    minlength="3"
                    maxlength="20"
                    autocomplete="nickname"
                    required
                >

                <p class="form-help">
                    This nickname will appear on your profile.
                </p>

            </div>

            <div class="form-group">

                <label for="email">
                    Email address
                </label>

                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required
                >

            </div>

            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input
                    id="password"
                    name="password"
                    type="password"
                    minlength="8"
                    autocomplete="new-password"
                    required
                >

                <p class="form-help">
                    Use at least 8 characters.
                </p>

            </div>

            <div class="form-group">

                <label for="confirmPassword">
                    Confirm password
                </label>

                <input
                    id="confirmPassword"
                    name="confirmPassword"
                    type="password"
                    minlength="8"
                    autocomplete="new-password"
                    required
                >

            </div>

            <button
                class="auth-button"
                id="signupButton"
                type="submit"
            >
                Create Free Account
            </button>

            <div
                class="auth-message"
                id="signupMessage"
            ></div>

        </form>

        <div class="login-divider">
            Or continue with
        </div>

        <div class="login-options">

            <button
                class="login-option"
                id="googleButton"
                type="button"
            >
                <span class="login-option-icon google-icon">
                    G
                </span>

                Continue with Google
            </button>

            <button
                class="login-option"
                id="emailButton"
                type="button"
            >
                <span class="login-option-icon email-icon">
                    ✉
                </span>

                Continue with Email
            </button>

            <button
                class="login-option"
                id="appleButton"
                type="button"
            >
                <span class="login-option-icon apple-icon">
                    A
                </span>

                Continue with Apple
            </button>

        </div>

        <p class="auth-bottom-text">
            Already registered?
            <a href="signin.html">Sign in here</a>
        </p>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
    const signupForm =
        document.getElementById("signupForm");

    const signupButton =
        document.getElementById("signupButton");

    const signupMessage =
        document.getElementById("signupMessage");

    const googleButton =
        document.getElementById("googleButton");

    const emailButton =
        document.getElementById("emailButton");

    const appleButton =
        document.getElementById("appleButton");

    function showSignupMessage(message, type) {
        signupMessage.textContent = message;

        signupMessage.className =
            `auth-message show ${type}`;
    }

    function setSocialButtonsDisabled(disabled) {
        googleButton.disabled = disabled;
        emailButton.disabled = disabled;
        appleButton.disabled = disabled;
    }

    async function continueWithProvider(provider) {
        setSocialButtonsDisabled(true);

        showSignupMessage(
            `Opening ${provider === "google" ? "Google" : "Apple"}...`,
            "success"
        );

        try {
            const {
                error
            } =
                await window
                    .quranAcademySupabase
                    .auth
                    .signInWithOAuth({
                        provider,

                        options: {
                            redirectTo:
                                "https://quranacademy24.com/account.html"
                        }
                    });

            if (error) {
                throw error;
            }
        } catch (error) {
            console.error(error);

            let message =
                error.message ||
                "This login option could not open.";

            if (
                message
                    .toLowerCase()
                    .includes("provider")
            ) {
                message =
                    "This login option has not been connected in Supabase yet.";
            }

            showSignupMessage(
                message,
                "error"
            );

            setSocialButtonsDisabled(false);
        }
    }

    googleButton.addEventListener(
        "click",
        () => continueWithProvider("google")
    );

    appleButton.addEventListener(
        "click",
        () => continueWithProvider("apple")
    );

    emailButton.addEventListener(
        "click",
        () => {
            signupForm.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });

            document
                .getElementById("username")
                .focus();

            showSignupMessage(
                "Enter your nickname, email, and password above.",
                "success"
            );
        }
    );

    signupForm.addEventListener(
        "submit",
        async (event) => {
            event.preventDefault();

            const username =
                document
                    .getElementById("username")
                    .value
                    .trim();

            const email =
                document
                    .getElementById("email")
                    .value
                    .trim()
                    .toLowerCase();

            const password =
                document
                    .getElementById("password")
                    .value;

            const confirmPassword =
                document
                    .getElementById(
                        "confirmPassword"
                    )
                    .value;

            if (username.length < 3) {
                showSignupMessage(
                    "Your nickname must contain at least 3 characters.",
                    "error"
                );

                return;
            }

            if (password.length < 8) {
                showSignupMessage(
                    "Your password must contain at least 8 characters.",
                    "error"
                );

                return;
            }

            if (password !== confirmPassword) {
                showSignupMessage(
                    "The passwords do not match.",
                    "error"
                );

                return;
            }

            signupButton.disabled = true;

            signupButton.textContent =
                "Creating account...";

            signupMessage.className =
                "auth-message";

            try {
                const {
                    data,
                    error
                } =
                    await window
                        .quranAcademySupabase
                        .auth
                        .signUp({
                            email,
                            password,

                            options: {
                                data: {
                                    username
                                },

                                emailRedirectTo:
                                    "https://quranacademy24.com/account.html"
                            }
                        });

                if (error) {
                    throw error;
                }

                if (data.session) {
                    showSignupMessage(
                        "Account created! Opening your account...",
                        "success"
                    );

                    window.setTimeout(() => {
                        window.location.href =
                            "account.html";
                    }, 500);

                    return;
                }

                showSignupMessage(
                    "Account created. Check your email for the confirmation link.",
                    "success"
                );
            } catch (error) {
                console.error(error);

                let message =
                    error.message ||
                    "The account could not be created.";

                if (
                    message
                        .toLowerCase()
                        .includes("already registered")
                ) {
                    message =
                        "An account already uses this email. Try signing in.";
                }

                showSignupMessage(
                    message,
                    "error"
                );
            } finally {
                signupButton.disabled = false;

                signupButton.textContent =
                    "Create Free Account";
            }
        }
    );
</script>

</body>
</html>
