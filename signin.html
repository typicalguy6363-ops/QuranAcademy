<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign In | QuranAcademy</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<header class="auth-header">

    <a class="auth-logo" href="index.html">
        QuranAcademy
    </a>

    <nav class="auth-nav">
        <a href="index.html">Home</a>

        <a
            class="primary-link"
            href="signup.html"
        >
            Sign Up
        </a>
    </nav>

</header>

<main class="auth-page">

    <section class="auth-card">

        <div class="auth-icon">
            🔐
        </div>

        <h1>
            Welcome Back
        </h1>

        <p class="auth-description">
            Sign in to continue learning and access
            your QuranAcademy account.
        </p>

        <form id="signinForm">

            <div class="form-group">

                <label for="email">
                    Email address
                </label>

                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required
                >

            </div>

            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    required
                >

            </div>

            <button
                class="auth-button"
                id="signinButton"
                type="submit"
            >
                Sign In
            </button>

            <div
                class="auth-message"
                id="signinMessage"
            ></div>

        </form>

        <p class="auth-bottom-text">
            Don’t have an account?
            <a href="signup.html">Create one here</a>
        </p>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
    const signinForm =
        document.getElementById("signinForm");

    const signinButton =
        document.getElementById("signinButton");

    const signinMessage =
        document.getElementById("signinMessage");

    function showSigninMessage(message, type) {
        signinMessage.textContent = message;

        signinMessage.className =
            `auth-message show ${type}`;
    }

    async function checkExistingLogin() {
        const {
            data
        } =
            await window
                .quranAcademySupabase
                .auth
                .getSession();

        if (data.session) {
            window.location.href =
                "account.html";
        }
    }

    signinForm.addEventListener(
        "submit",
        async (event) => {
            event.preventDefault();

            const email =
                document
                    .getElementById("email")
                    .value
                    .trim()
                    .toLowerCase();

            const password =
                document
                    .getElementById("password")
                    .value;

            signinButton.disabled = true;
            signinButton.textContent =
                "Signing in...";

            signinMessage.className =
                "auth-message";

            try {
                const {
                    data,
                    error
                } =
                    await window
                        .quranAcademySupabase
                        .auth
                        .signInWithPassword({
                            email,
                            password
                        });

                if (error) {
                    throw error;
                }

                if (!data.session) {
                    throw new Error(
                        "No login session was created."
                    );
                }

                showSigninMessage(
                    "Login successful! Opening your account...",
                    "success"
                );

                window.setTimeout(() => {
                    window.location.href =
                        "account.html";
                }, 700);
            } catch (error) {
                console.error(error);

                let message =
                    error.message ||
                    "The login was unsuccessful.";

                if (
                    message
                        .toLowerCase()
                        .includes("email not confirmed")
                ) {
                    message =
                        "Confirm your email first, then try signing in again.";
                }

                if (
                    message
                        .toLowerCase()
                        .includes("invalid login")
                ) {
                    message =
                        "The email or password is incorrect.";
                }

                showSigninMessage(
                    message,
                    "error"
                );
            } finally {
                signinButton.disabled = false;
                signinButton.textContent =
                    "Sign In";
            }
        }
    );

    checkExistingLogin();
</script>

</body>
</html>
