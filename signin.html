<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign In | QuranAcademy</title>

    <link rel="stylesheet" href="auth.css">

    <style>
        .login-divider {
            margin: 25px 0 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #8796a6;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .login-divider::before,
        .login-divider::after {
            content: "";
            height: 1px;
            flex: 1;
            background: #dbe9e4;
        }

        .login-options {
            display: grid;
            gap: 11px;
        }

        .login-option {
            width: 100%;
            min-height: 51px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 2px solid #dbe9e4;
            border-radius: 15px;
            color: #1d3557;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 800;
            transition:
                transform 0.2s ease,
                border-color 0.2s ease,
                background 0.2s ease;
        }

        .login-option:hover {
            transform: translateY(-2px);
            border-color: #0f9d78;
            background: #f5fcf9;
        }

        .login-option:disabled {
            opacity: 0.6;
            cursor: wait;
            transform: none;
        }

        .login-option-icon {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            border-radius: 9px;
            font-size: 1rem;
            font-weight: 900;
        }

        .google-icon {
            color: #4285f4;
            background: #eef4ff;
        }

        .email-icon {
            color: #08745a;
            background: #e2f7ef;
        }

        .apple-icon {
            color: white;
            background: #111111;
        }
    </style>
</head>

<body>

<header class="auth-header">

    <a class="auth-logo" href="index.html">
        QuranAcademy
    </a>

    <nav class="auth-nav">
        <a href="index.html">Home</a>

        <a
            class="primary-link"
            href="signup.html"
        >
            Sign Up
        </a>
    </nav>

</header>

<main class="auth-page">

    <section class="auth-card">

        <div class="auth-icon">
            🔐
        </div>

        <h1>
            Welcome Back
        </h1>

        <p class="auth-description">
            Sign in to continue learning and access
            your QuranAcademy account.
        </p>

        <form id="signinForm">

            <div class="form-group">

                <label for="email">
                    Email address
                </label>

                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required
                >

            </div>

            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    required
                >

            </div>

            <button
                class="auth-button"
                id="signinButton"
                type="submit"
            >
                Sign In
            </button>

            <div
                class="auth-message"
                id="signinMessage"
            ></div>

        </form>

        <div class="login-divider">
            Or continue with
        </div>

        <div class="login-options">

            <button
                class="login-option"
                id="googleButton"
                type="button"
            >
                <span class="login-option-icon google-icon">
                    G
                </span>

                Continue with Google
            </button>

            <button
                class="login-option"
                id="emailButton"
                type="button"
            >
                <span class="login-option-icon email-icon">
                    ✉
                </span>

                Continue with Email
            </button>

            <button
                class="login-option"
                id="appleButton"
                type="button"
            >
                <span class="login-option-icon apple-icon">
                    A
                </span>

                Continue with Apple
            </button>

        </div>

        <p class="auth-bottom-text">
            Don’t have an account?
            <a href="signup.html">Create one here</a>
        </p>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
    const signinForm =
        document.getElementById("signinForm");

    const signinButton =
        document.getElementById("signinButton");

    const signinMessage =
        document.getElementById("signinMessage");

    const googleButton =
        document.getElementById("googleButton");

    const emailButton =
        document.getElementById("emailButton");

    const appleButton =
        document.getElementById("appleButton");

    function showSigninMessage(message, type) {
        signinMessage.textContent = message;

        signinMessage.className =
            `auth-message show ${type}`;
    }

    function setSocialButtonsDisabled(disabled) {
        googleButton.disabled = disabled;
        emailButton.disabled = disabled;
        appleButton.disabled = disabled;
    }

    async function continueWithProvider(provider) {
        setSocialButtonsDisabled(true);

        showSigninMessage(
            `Opening ${provider === "google" ? "Google" : "Apple"}...`,
            "success"
        );

        try {
            const {
                error
            } =
                await window
                    .quranAcademySupabase
                    .auth
                    .signInWithOAuth({
                        provider,

                        options: {
                            redirectTo:
                                "https://quranacademy24.com/account.html"
                        }
                    });

            if (error) {
                throw error;
            }
        } catch (error) {
            console.error(error);

            let message =
                error.message ||
                "This login option could not open.";

            if (
                message
                    .toLowerCase()
                    .includes("provider")
            ) {
                message =
                    "This login option has not been connected in Supabase yet.";
            }

            showSigninMessage(
                message,
                "error"
            );

            setSocialButtonsDisabled(false);
        }
    }

    googleButton.addEventListener(
        "click",
        () => continueWithProvider("google")
    );

    appleButton.addEventListener(
        "click",
        () => continueWithProvider("apple")
    );

    emailButton.addEventListener(
        "click",
        () => {
            signinForm.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });

            document
                .getElementById("email")
                .focus();

            showSigninMessage(
                "Enter your email and password above.",
                "success"
            );
        }
    );

    async function checkExistingLogin() {
        try {
            const {
                data
            } =
                await window
                    .quranAcademySupabase
                    .auth
                    .getSession();

            if (data.session) {
                window.location.replace(
                    "account.html"
                );
            }
        } catch (error) {
            console.error(error);
        }
    }

    signinForm.addEventListener(
        "submit",
        async (event) => {
            event.preventDefault();

            const email =
                document
                    .getElementById("email")
                    .value
                    .trim()
                    .toLowerCase();

            const password =
                document
                    .getElementById("password")
                    .value;

            signinButton.disabled = true;

            signinButton.textContent =
                "Signing in...";

            signinMessage.className =
                "auth-message";

            try {
                const {
                    data,
                    error
                } =
                    await window
                        .quranAcademySupabase
                        .auth
                        .signInWithPassword({
                            email,
                            password
                        });

                if (error) {
                    throw error;
                }

                if (!data.session) {
                    throw new Error(
                        "No login session was created."
                    );
                }

                showSigninMessage(
                    "Login successful! Opening your account...",
                    "success"
                );

                window.setTimeout(() => {
                    window.location.replace(
                        "account.html"
                    );
                }, 500);
            } catch (error) {
                console.error(error);

                let message =
                    error.message ||
                    "The login was unsuccessful.";

                const lowercaseMessage =
                    message.toLowerCase();

                if (
                    lowercaseMessage.includes(
                        "email not confirmed"
                    )
                ) {
                    message =
                        "Your email has not been confirmed. Turn off Confirm Email in Supabase or confirm the account.";
                }

                if (
                    lowercaseMessage.includes(
                        "invalid login"
                    )
                ) {
                    message =
                        "The email or password is incorrect.";
                }

                showSigninMessage(
                    message,
                    "error"
                );
            } finally {
                signinButton.disabled = false;

                signinButton.textContent =
                    "Sign In";
            }
        }
    );

    checkExistingLogin();
</script>

</body>
</html>
