<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Account | QuranAcademy</title>

    <link rel="stylesheet" href="academy.css">
</head>

<body>

<header class="academy-header">

    <a class="academy-logo" href="index.html">
        QuranAcademy
    </a>

    <nav class="academy-nav">
        <a href="index.html">Home</a>
        <a href="learn.html">Levels</a>
        <a href="reader.html">Full Quran</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
        <a class="account-link active" href="account.html">Account</a>
    </nav>

</header>

<main class="page-shell">

    <p class="eyebrow">
        Learner profile
    </p>

    <h1 class="page-title">
        My Account
    </h1>

    <section
        class="surface-card account-summary"
        id="accountSummary"
    >

        <div class="empty-state">
            Loading your account...
        </div>

    </section>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
    const accountSummary =
        document.getElementById(
            "accountSummary"
        );

    const toast =
        document.getElementById("toast");

    function getRank(xp) {
        if (xp >= 1000) {
            return {
                name: "Diamond",
                emoji: "💎",
                next: 1325
            };
        }

        if (xp >= 700) {
            return {
                name: "Platinum",
                emoji: "🏅",
                next: 1000
            };
        }

        if (xp >= 400) {
            return {
                name: "Gold",
                emoji: "🥇",
                next: 700
            };
        }

        if (xp >= 150) {
            return {
                name: "Silver",
                emoji: "🥈",
                next: 400
            };
        }

        return {
            name: "Bronze",
            emoji: "🥉",
            next: 150
        };
    }

    function getInitials(name) {
        return name
            .trim()
            .split(/\s+/)
            .filter(Boolean)
            .slice(0, 2)
            .map((word) => word[0].toUpperCase())
            .join("") || "QA";
    }

    function showToast(message) {
        toast.textContent = message;
        toast.classList.remove("show");

        void toast.offsetWidth;

        toast.classList.add("show");
    }

    function renderAccount(user, profile) {
        const xp = profile.xp || 0;

        const completed =
            profile.completed_levels || [];

        const rewards =
            profile.unlocked_rewards || [];

        const rank = getRank(xp);

        const rankPercentage =
            Math.min(
                100,
                Math.round(
                    xp / rank.next * 100
                )
            );

        accountSummary.innerHTML = `
            <div class="account-main">

                <div class="profile-avatar">
                    ${getInitials(profile.username)}
                </div>

                <div>
                    <h2>${escapeHTML(profile.username)}</h2>

                    <p class="account-email">
                        ${escapeHTML(user.email || "")}
                    </p>

                    <span class="rank-badge">
                        ${rank.emoji} ${rank.name} Learner
                    </span>
                </div>

            </div>

            <div class="stat-grid">

                <div class="stat-card">
                    <span>Total XP</span>
                    <strong>${xp}</strong>
                </div>

                <div class="stat-card">
                    <span>Completed</span>
                    <strong>${completed.length}/7</strong>
                </div>

                <div class="stat-card">
                    <span>Games</span>
                    <strong>${rewards.length}</strong>
                </div>

            </div>

            <div class="progress-label">
                <span>Rank progress</span>
                <span>${xp} / ${rank.next} XP</span>
            </div>

            <div class="progress-track">
                <div
                    class="progress-fill"
                    style="width: ${rankPercentage}%"
                ></div>
            </div>

            <div class="account-action-grid">

                <a
                    class="button button-primary"
                    href="learn.html"
                >
                    📚 Continue Learning
                </a>

                <a
                    class="button button-secondary"
                    href="leaderboard.html"
                >
                    🏆 Leaderboard
                </a>

                <a
                    class="button button-secondary"
                    href="rewards.html"
                >
                    🎮 Reward Arcade
                </a>

                <button
                    class="button button-dark"
                    id="signoutButton"
                    type="button"
                >
                    Sign Out
                </button>

            </div>
        `;

        document
            .getElementById("signoutButton")
            .addEventListener(
                "click",
                signOut
            );
    }

    function escapeHTML(value) {
        const element =
            document.createElement("div");

        element.textContent = value;

        return element.innerHTML;
    }

    async function signOut() {
        const button =
            document.getElementById(
                "signoutButton"
            );

        button.disabled = true;
        button.textContent = "Signing out...";

        const {
            error
        } =
            await window
                .quranAcademySupabase
                .auth
                .signOut();

        if (error) {
            showToast(error.message);

            button.disabled = false;
            button.textContent = "Sign Out";
            return;
        }

        window.location.replace(
            "signin.html"
        );
    }

    async function loadAccount() {
        try {
            const {
                data: userData,
                error: userError
            } =
                await window
                    .quranAcademySupabase
                    .auth
                    .getUser();

            if (
                userError ||
                !userData.user
            ) {
                window.location.replace(
                    "signin.html"
                );

                return;
            }

            const user =
                userData.user;

            const {
                data: profile,
                error: profileError
            } =
                await window
                    .quranAcademySupabase
                    .from("profiles")
                    .select(
                        "id, username, xp, plan, completed_levels, unlocked_rewards"
                    )
                    .eq("id", user.id)
                    .single();

            if (profileError) {
                throw profileError;
            }

            renderAccount(user, profile);
        } catch (error) {
            console.error(error);

            accountSummary.innerHTML = `
                <div class="empty-state">
                    Your account could not load.
                    Please sign in again.<br><br>

                    <a
                        class="button button-primary"
                        href="signin.html"
                    >
                        Sign In
                    </a>
                </div>
            `;
        }
    }

    loadAccount();
</script>

</body>
</html>
